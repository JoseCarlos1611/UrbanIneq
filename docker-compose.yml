services:
  data-init:
    build:
      context: ./backend
      dockerfile: Dockerfile.r
    image: urbanineq-r:latest
    container_name: unfair-urban-data-init
    command: >
      Rscript -e "Sys.setenv(DOWNLOAD_IECA='true', DOWNLOAD_INE=Sys.getenv('DOWNLOAD_INE', 'false')); source('/app/datadl.R')"
    volumes:
      - ./backend/IECA:/app/IECA
      - ./backend/INE:/app/INE
    restart: "no"

  andalucia-osrm:
    build:
      context: ./backend/andalucia-osrm
      dockerfile: Dockerfile
    container_name: andalucia-osrm
    ports:
      - "5001:5001"
    restart: unless-stopped

  r-plumber:
    build:
      context: ./backend
      dockerfile: Dockerfile.r
    image: urbanineq-r:latest
    container_name: unfair-urban-r
    depends_on:
      data-init:
        condition: service_completed_successfully
      andalucia-osrm:
        condition: service_started
    environment:
      OSRM_URL: http://andalucia-osrm:5001/
    ports:
      - "8000:8000"
    volumes:
      - ./backend/results:/app/results
      - ./backend/IECA:/app/IECA
      - ./backend/INE:/app/INE
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: unfair-urban-fastapi
    depends_on:
      data-init:
        condition: service_completed_successfully
      r-plumber:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./backend/results:/app/results
      - ./backend/IECA:/app/IECA
      - ./backend/INE:/app/INE
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: unfair-urban-frontend
    depends_on:
      - api
    ports:
      - "8081:80"
    restart: unless-stopped
