version: '3.9'

services:
  api:
    build:
      context: ./frontend
      dockerfile: Dockerfile.api
    container_name: unfair-urban-fastapi
    depends_on:
      - r-plumber
    ports:
      - "8080:8080"
    volumes:
      - ./results:/app/results
    restart: unless-stopped

  r-plumber:
    build:
      context: ./frontend
      dockerfile: Dockerfile.r
    container_name: unfair-urban-r
    depends_on:
      - andalucia-osrm
    environment:
      OSRM_URL: http://andalucia-osrm:5001/
    ports:
      - "8000:8000"
    volumes:
      - ./results:/app/results
      - ./IECA:/app/IECA
      - ./INE:/app/INE
    restart: unless-stopped

  andalucia-osrm:
    build:
      context: ./frontend/andalucia-osrm
    container_name: andalucia-osrm
    ports:
      - "5001:5001"
    restart: unless-stopped
