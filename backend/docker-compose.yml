# This file is kept only for reference.
# Prefer running Docker Compose from the project root with ../docker-compose.yml:
#   cd ..
#   docker compose up --build

services:
  data-init:
    build:
      context: .
      dockerfile: Dockerfile.r
    image: urbanineq-r:latest
    container_name: unfair-urban-data-init
    command: >
      Rscript -e "Sys.setenv(DOWNLOAD_IECA='true', DOWNLOAD_INE=Sys.getenv('DOWNLOAD_INE', 'false')); source('/app/datadl.R')"
    volumes:
      - ./IECA:/app/IECA
      - ./INE:/app/INE
    restart: "no"

  andalucia-osrm:
    build:
      context: ./andalucia-osrm
      dockerfile: Dockerfile
    container_name: andalucia-osrm
    ports:
      - "5001:5001"
    restart: unless-stopped

  r-plumber:
    build:
      context: .
      dockerfile: Dockerfile.r
    image: urbanineq-r:latest
    container_name: unfair-urban-r
    depends_on:
      data-init:
        condition: service_completed_successfully
      andalucia-osrm:
        condition: service_started
    environment:
      OSRM_URL: http://andalucia-osrm:5001/
    ports:
      - "8000:8000"
    volumes:
      - ./results:/app/results
      - ./IECA:/app/IECA
      - ./INE:/app/INE
    restart: unless-stopped
